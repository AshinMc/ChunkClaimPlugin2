# ChunkClaimPlugin2 Configuration

# Language / Locale
# Set your language file to use (matches files in plugins/ChunkClaimPlugin2/lang/)
# Examples: en_US, es_ES
locale: en_US

# Maximum number of chunks a player can claim (0 = unlimited)
max-claims-per-player: 10

# Item used to claim chunks on right click (Set to "NONE" to disable)
claim-item: "WOODEN_SHOVEL"

# Messages
messages:
  # Optional: override messages by key here.
  # Example:
  # chunk-claim-success: "&aChunk claimed!"
  # max-claims-reached: "&cYou have reached your maximum number of claims (%max%)."

# Message toggles - turn on/off specific action messages for all players
# Set to true to show the message, false to hide it
message-toggles:
  deny-break: true        # Message when block break is denied
  deny-place: true        # Message when block place is denied
  deny-interact: true     # Message when interaction is denied
  deny-entity: true       # Message when entity damage is denied
  deny-pvp: true          # Message when PvP is denied
  claim-success: true    # Message when chunk is claimed
  unclaim-success: true  # Message when chunk is unclaimed

# Particle settings
visualization:
  duration-seconds: 10
  particle-height: 100
  particle-spacing: 0.5
  # Default particle type for chunk borders. Players can override this per-player.
  # Valid types: FLAME, END_ROD, HEART, VILLAGER_HAPPY, REDSTONE, SNOWFLAKE, SOUL_FIRE_FLAME, CHERRY_LEAVES
  particle-type: FLAME

# Protection settings
protection:
  prevent-block-break: true
  prevent-block-place: true
  prevent-interactions: true

# Default claim flags (applied to new claims)
# Players can toggle these per-claim in /chunksettings -> Claims -> Claim Settings
claim-flags:
  mob-griefing: true     # Block mob griefing (snow trails, enderman, etc.)
  mob-spawning: false    # Block natural mob spawning
  mob-entry: false       # Block all mobs from entering the chunk (invisible wall)
  mob-protection: true   # Block players from attacking non-hostile mobs (cows, pigs, etc.)
  explosions: true       # Block explosion damage (creepers, TNT, etc.)
  pvp: false             # Block PvP combat
  greeting-title: true   # Show welcome title when entering claim
  interact-chest: true
  interact-furnace: true
  interact-stonecutter: true
  interact-door: true
  interact-redstone: true