name: CCP
version: '${version}'
main: org.ashin.chunkClaimPlugin2.ChunkClaimPlugin2
api-version: '${apiVersion}'
softdepend: [WorldGuard, WorldEdit]
commands:
  claimchunk:
    description: Claim the chunk you are standing in with an optional name
    usage: /<command> [name]
    permission: ccp.claim
  unclaimchunk:
    description: Unclaim a chunk (by name removes entire group, no args unclaims current chunk)
    usage: /<command> [name]
    permission: ccp.unclaim
  checkchunk:
    description: Check the ownership and claim name of the chunk you are standing in
    usage: /<command>
    permission: ccp.check
  infochunk:
    description: Get a list of your claimed chunk groups
    usage: /<command>
    permission: ccp.info
  visualizechunk:
    description: Visualize your claim borders (by name or all)
    usage: /<command> [name]
    permission: ccp.visualize
  chunkexpand:
    description: Expand an existing named claim by adding the current chunk
    usage: /<command> <name>
    permission: ccp.expand
  chunklang:
    description: View or set your language/locale
    usage: /<command> [get|list|set <locale>]
    permission: ccp.lang
  chunksettings:
    description: Open the chunk settings GUI
    usage: /<command>
    permission: ccp.settings
  chunktp:
    description: Teleport to a chunk by claim name
    usage: /<command> <name>
    permission: ccp.teleport
  chunkadmin:
    description: Open the admin settings GUI
    usage: /<command>
    permission: chunkclaim.admin
permissions:
  ccp.claim:
    description: Allows claiming chunks
    default: true
  ccp.unclaim:
    description: Allows unclaiming chunks
    default: true
  ccp.check:
    description: Allows checking chunk ownership
    default: true
  ccp.info:
    description: Allows viewing your claim groups
    default: true
  ccp.visualize:
    description: Allows visualizing claims
    default: true
  ccp.expand:
    description: Allows expanding claims
    default: true
  ccp.lang:
    description: Allows changing player language
    default: true
  ccp.settings:
    description: Allows using the chunk settings GUI
    default: true
  ccp.teleport:
    description: Allows teleporting to chunks
    default: true
  chunkclaimprotection.bypass:
    description: Allows bypassing chunk protection checks
    default: op
  chunkclaim.admin:
    description: Allows access to the admin settings GUI
    default: op
  chunkclaim.teleport:
    description: Allows using the Teleport action from the GUI
    default: op